<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAMİ BERBER SALONU</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;color:#fff}
header{
position:fixed;
width:100%;
padding:20px 8%;
background:#000;
border-bottom:1px solid gold;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
color:gold;
font-size:28px;
font-weight:bold;
}
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1621605815971-fbc98d665033?q=80&w=1200');
background-size:cover;
background-position:center;
}
.hero h1{
font-size:64px;
color:gold;
}
.hero p{
margin-top:20px;
font-size:22px;
}
.btn{
display:inline-block;
margin-top:25px;
padding:15px 30px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
section{
padding:80px 10%;
}
.title{
text-align:center;
color:gold;
margin-bottom:30px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.card{
background:#1b1b1b;
padding:25px;
border:1px solid gold;
border-radius:10px;
text-align:center;
}
footer{
background:#000;
padding:20px;
text-align:center;
}
</style>
</head>
<body>

<header>
<div class="logo">SELAMİ BERBER SALONU</div>
</header>

<section class="hero">
<h1>SELAMİ BERBER SALONU</h1>
<p>Geleneksel Ustalık, Modern Stil</p>
<a class="btn" href="#">Randevu Al</a>
</section>

<section>
<h2 class="title">Hizmetlerimiz</h2>
<div class="cards">
<div class="card">✂️ Saç Kesimi</div>
<div class="card">🧔 Sakal Tasarımı</div>
<div class="card">✨ Cilt Bakımı</div>
<div class="card">👑 VIP Paket</div>
</div>
</section>

<section>
<h2 class="title">İletişim</h2>
<center>
<p>📞 Telefon Numaranız</p>
<p>📍 Adres Bilgisi</p>
</center>
</section>

<footer>
© 2026 SELAMİ BERBER SALONU
</footer>

</body>
</html>
